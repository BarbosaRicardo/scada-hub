<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0a1628"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <!-- Network node lines -->
  <line x1="16" y1="8"  x2="8"  y2="20" stroke="#f59e0b" stroke-width="1"   opacity="0.5"/>
  <line x1="16" y1="8"  x2="24" y2="20" stroke="#f59e0b" stroke-width="1"   opacity="0.5"/>
  <line x1="8"  y1="20" x2="24" y2="20" stroke="#f59e0b" stroke-width="1"   opacity="0.5"/>
  <line x1="16" y1="8"  x2="16" y2="16" stroke="#f59e0b" stroke-width="1"   opacity="0.5"/>
  <!-- Node dots -->
  <circle cx="16" cy="8"  r="2.5" fill="#f59e0b"/>
  <circle cx="8"  cy="20" r="2"   fill="#10b981"/>
  <circle cx="24" cy="20" r="2"   fill="#60a5fa"/>
  <!-- Center SCADA master — brightest -->
  <circle cx="16" cy="16" r="3"   fill="#f59e0b"/>
  <circle cx="16" cy="16" r="1.2" fill="#0a1628"/>
</svg>
